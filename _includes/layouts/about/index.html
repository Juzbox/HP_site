<img class="floating-img" src="" alt="" />

<script>
  const floatingImg = document.querySelector('.floating-img');
  if (floatingImg) {
    let x = Math.random() * (window.innerWidth - 200);
    let y = Math.random() * (window.innerHeight - 200);
    let vx = 0.6;
    let vy = 0.4;
    let angle = 0;
    let rotationSpeed = 0.3;

    floatingImg.addEventListener('mouseenter', () => rotationSpeed = 8);
    floatingImg.addEventListener('mouseleave', () => rotationSpeed = 0.3);

    function animateFloat() {
      x += vx;
      y += vy;
      angle += rotationSpeed;

      if (x <= 0 || x >= window.innerWidth - floatingImg.width) vx *= -1;
      if (y <= 0 || y >= window.innerHeight - floatingImg.height) vy *= -1;

      floatingImg.style.left = x + 'px';
      floatingImg.style.top = y + 'px';
      floatingImg.style.transform = `rotate(${angle}deg)`;

      requestAnimationFrame(animateFloat);
    }

    animateFloat();
  }
</script>

<script>
  // ============================================
  // HOME CAROUSEL — scoped to .carousel only
  // ============================================
  const homeCarousel = document.querySelector('.carousel');
  const homeSlides = homeCarousel ? homeCarousel.querySelectorAll('.carousel-slide') : [];
  let current = 0;

  function showSlide(index) {
    if (homeSlides.length === 0) return;
    homeSlides[current].classList.remove('active');
    current = (index + homeSlides.length) % homeSlides.length;
    homeSlides[current].classList.add('active');
  }

  function moveCarousel(dir) {
    showSlide(current + dir);
  }

  if (homeSlides.length > 0) {
    setInterval(() => showSlide(current + 1), 5000);
  }

  // ============================================
// CONTENT SLIDESHOWS
// ============================================
document.querySelectorAll('.content-slideshow').forEach(function(slideshow) {
  const slides = slideshow.querySelectorAll('.content-slide');
  const dots = slideshow.querySelectorAll('.content-dot');
  let index = 0;

  function showSlide(n) {
    slides[index].classList.remove('active');
    dots[index].classList.remove('active');
    index = (n + slides.length) % slides.length;
    slides[index].classList.add('active');
    dots[index].classList.add('active');
  }

  slideshow.querySelector('.content-prev').addEventListener('click', () => showSlide(index - 1));
  slideshow.querySelector('.content-next').addEventListener('click', () => showSlide(index + 1));
  dots.forEach(dot => {
    dot.addEventListener('click', () => showSlide(parseInt(dot.dataset.index)));
  });
});

  // ============================================
  // TABLE OF CONTENTS
  // ============================================
  const headings = document.querySelectorAll('.project-content h2');
  const tocList = document.getElementById('toc-list');

  if (headings.length > 0 && tocList) {
    headings.forEach((heading, i) => {
      const id = 'section-' + i;
      heading.id = id;

      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = heading.textContent;
      li.appendChild(a);
      tocList.appendChild(li);
    });
  }


// ============================================
// EXTERNAL LINKS — open in new tab
// ============================================
document.querySelectorAll('a').forEach(link => {
  const href = link.getAttribute('href');
  if (href && (href.startsWith('http://') || href.startsWith('https://'))) {
    link.setAttribute('target', '_blank');
    link.setAttribute('rel', 'noopener noreferrer');
  }
});


</script>
