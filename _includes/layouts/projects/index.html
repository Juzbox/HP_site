
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
nav {
  background-color: #333;
  padding: 1rem;
  flex-shrink: 0;
  position: fixed;
  width:100vw;
  top: 0;
  z-index: 100;
}
    nav ul {
      list-style: none;
      display: flex;
      gap: 2rem;
    }
    nav a {
      color: white;
      text-decoration: none;
    }
    nav a:hover {
      color: hotpink;
    }
    .content-wrapper {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .left {
      flex: 0 0 50%;
      overflow: hidden;
    }


    .left img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      display: block;

    }
    .right {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 0 10%;
      gap: 1rem;
      list-style: none;
    }
    h1 { font-size: 2.5rem; }
    h3 { font-size: 1.5rem; }
    @media (max-width: 640px) {
      .content-wrapper { flex-direction: column; height: auto; }
      .left { flex: 0 0 300px; width: 100%; }
      .left img { height: 100%; }
    }
    a {
      color: hotpink;
    }
    a:link {
      color: red;
    }
    a:visited {
      color: black;
    }
    a:hover {
      color: hotpink;
      background-color: yellow;
    }
    a:active {
      color: blue;
    }

    .project {
  max-width: 700px;
  margin: 6rem auto 4rem;
  padding: 0 2rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  line-height: 1.7;
}

.project img {
  width: 100%;
  height: auto;
}

.project em {
  font-size: 0.85rem;
  color: #666;
}
  </style>
</head>
<body>
  <nav>
    <ul>
      <li><a href="/">Hugo Pilate</a></li>
      <li><a href="/about/">About</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/contact/">Contact</a></li>
    </ul>
  </nav>
  
  <div class="content-wrapper">
    <div class="project">
  <h2></h2>
  <p class="lead"></p>
  <p><strong>Role:</strong> </p>
  <p><strong>Client:</strong> </p>

  

  <a href="/projects/">← Back to projects</a>
</div>
  </div>

</body>
</html>
