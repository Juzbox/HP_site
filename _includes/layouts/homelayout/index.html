<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
    }

    .left {
      flex: 0 0 50%;
    }

    .left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .right {
      flex: 0 0 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 { font-size: 2.5rem; }

    @media (max-width: 640px) {
      body { flex-direction: column; height: auto; }
      .left { flex: 0 0 300px; width: 100%; }
      .left img { height: 300px; }
    }
    .right {
      flex: 0 0 50%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 0 10%;
      gap: 1rem;
    }

  </style>
</head>
<body>
  <div class="left">
    <img src="" alt="" />
  </div>
  <div class="right">
    <h1></h1>
    <p></p>
    <p><ul>
  
</ul></p>
    <p></p>
    <ul>
      
    </ul>
  </div>
</body>
</html>
