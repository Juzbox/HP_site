
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  
  
<link rel="stylesheet" href="/assets/css/style.css" />
  
</head>
<body class="">
  <nav>
    <ul>
      <li><a href="/">Hugo Pilate</a></li>
      <li><a href="/about/">About</a></li>
      <li><a href="/projects/">Projects</a></li>
      <li><a href="/writing/">Writing</a></li>
    </ul>
  </nav>
  
  <div class="content-wrapper">
    <div class="writing-list">

  <div class="tab-labels" id="tab-labels">
    <button class="tag-btn active" data-tag="all">All</button>
  </div>

  <div class="project-grid" id="project-grid">
    
  </div>

</div>

<script>
  const skipTags = ['writing', projects', 'work', 'selected', 'spotlight'];
  const cards = document.querySelectorAll('.project-card');
  const labelsContainer = document.getElementById('tab-labels');

  // collect all unique tags from cards
  const allTags = new Set();
  cards.forEach(card => {
    card.dataset.tags.split(',').forEach(tag => {
      if (!skipTags.includes(tag.trim())) allTags.add(tag.trim());
    });
  });

  // build buttons dynamically
  allTags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.dataset.tag = tag;
    btn.textContent = tag;
    labelsContainer.appendChild(btn);
  });

  // filtering
  const buttons = document.querySelectorAll('.tag-btn');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tag = btn.dataset.tag;
      cards.forEach(card => {
        const tags = card.dataset.tags.split(',').map(t => t.trim());
        card.style.display = (tag === 'all' || tags.includes(tag)) ? 'flex' : 'none';
      });
    });
  });

  // check for ?tag= in URL and activate matching filter
const params = new URLSearchParams(window.location.search);
const preselected = params.get('tag');
if (preselected) {
  cards.forEach(card => {
    const tags = card.dataset.tags.split(',').map(t => t.trim());
    card.style.display = tags.includes(preselected) ? 'flex' : 'none';
  });
  // wait for buttons to be built then activate the right one
  setTimeout(() => {
    document.querySelectorAll('.tag-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tag === preselected);
    });
  }, 0);
}
</script>
  </div>

<script>
  let current = 0;
  const slides = document.querySelectorAll('.carousel-slide');

  function showSlide(index) {
    slides[current].classList.remove('active');
    current = (index + slides.length) % slides.length;
    slides[current].classList.add('active');
  }

  function moveCarousel(dir) {
    showSlide(current + dir);
  }

  if (slides.length > 0) {
    setInterval(() => showSlide(current + 1), 5000);
  }
</script>

</body>
</html>
