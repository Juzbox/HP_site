<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      display: flex;
      max-width: 900px;
      width: 90%;
      min-height: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* Left half — image */
    .card__image {
      flex: 0 0 50%;
      position: relative;
    }

    .card__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Right half — content */
    .card__content {
      flex: 0 0 50%;
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.25rem;
    }

    .card__title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .card__bio {
      font-size: 1rem;
      line-height: 1.7;
      color: #444;
    }

    .card__links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      list-style: none;
    }

    .card__links a {
      display: inline-block;
      padding: 0.4rem 1rem;
      border: 1.5px solid #1a1a1a;
      border-radius: 999px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    .card__links a:hover {
      background: #1a1a1a;
      color: #fff;
    }

    /* Responsive: stack on small screens */
    @media (max-width: 640px) {
      .card { flex-direction: column; }
      .card__image { flex: 0 0 260px; }
      .card__content { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <article class="card">

    <div class="card__image">
      <img src="" alt="" />
    </div>

    <div class="card__content">
      <h1 class="card__title"></h1>
      <p class="card__bio"></p>
      <ul class="card__links">
        
      </ul>
    </div>

  </article>
</body>
</html>
